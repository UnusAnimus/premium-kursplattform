name: Create Issues from ISSUES.md

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ISSUES.md'
      - '.github/workflows/create-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "backend" --color "0075ca" --description "Backend-Aufgaben" --force || true
          gh label create "database" --color "e4e669" --description "Datenbank-Aufgaben" --force || true
          gh label create "critical" --color "d73a4a" --description "Kritische Priorität" --force || true
          gh label create "auth" --color "c5def5" --description "Authentifizierung" --force || true
          gh label create "feature" --color "a2eeef" --description "Neues Feature" --force || true
          gh label create "payments" --color "e99695" --description "Zahlungen" --force || true
          gh label create "stripe" --color "6e5494" --description "Stripe-Integration" --force || true
          gh label create "high" --color "e4763a" --description "Hohe Priorität" --force || true
          gh label create "email" --color "bfd4f2" --description "E-Mail-System" --force || true
          gh label create "video" --color "0052cc" --description "Video-Hosting" --force || true
          gh label create "ai" --color "7057ff" --description "KI/AI-Features" --force || true
          gh label create "oauth" --color "d4c5f9" --description "OAuth / Social Login" --force || true
          gh label create "medium" --color "fbca04" --description "Mittlere Priorität" --force || true
          gh label create "admin" --color "ededed" --description "Admin-Bereich" --force || true
          gh label create "ux" --color "84b6eb" --description "User Experience" --force || true
          gh label create "design" --color "f9d0c4" --description "Design-Aufgaben" --force || true
          gh label create "low" --color "0e8a16" --description "Niedrige Priorität" --force || true
          gh label create "security" --color "ee0701" --description "Sicherheit" --force || true
          gh label create "analytics" --color "5319e7" --description "Analytics & Monitoring" --force || true
          gh label create "mobile" --color "006b75" --description "Mobile-Optimierung" --force || true

      - name: Create Issue 1 - Datenbank-Integration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[BACKEND] Datenbank einrichten (PostgreSQL + Prisma ORM)" --json title | grep -q "Datenbank einrichten"; then
            gh issue create \
              --title "[BACKEND] Datenbank einrichten (PostgreSQL + Prisma ORM)" \
              --body "## Beschreibung
          Die gesamte Plattform nutzt aktuell nur Mock-Daten aus \`src/lib/data.ts\`. Es gibt keine echte Datenbank.

          ## Aufgaben
          - [ ] PostgreSQL-Datenbank einrichten (lokal + Produktion)
          - [ ] Prisma ORM integrieren (\`npm install prisma @prisma/client\`)
          - [ ] Schema für alle Entitäten erstellen: \`User\`, \`Course\`, \`Module\`, \`Lesson\`, \`Subscription\`, \`Payment\`
          - [ ] Seed-Script für Testdaten schreiben
          - [ ] Mock-Daten in \`data.ts\` durch echte DB-Abfragen ersetzen

          ## Priorität
          🔴 Kritisch" \
              --label "backend,database,critical"
          fi

      - name: Create Issue 2 - Nutzer-Registrierung
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[AUTH] Nutzer-Registrierung implementieren" --json title | grep -q "Nutzer-Registrierung"; then
            gh issue create \
              --title "[AUTH] Nutzer-Registrierung implementieren" \
              --body "## Beschreibung
          Das Registrierungsformular existiert UI-seitig, sendet aber keine Daten. Neue Nutzer können sich nicht selbst registrieren.

          ## Aufgaben
          - [ ] API-Route \`POST /api/auth/register\` erstellen
          - [ ] Nutzer in Datenbank speichern (mit bcrypt-Passwort-Hash)
          - [ ] E-Mail-Validierung (Duplikat-Check)
          - [ ] Bestätigungs-E-Mail senden (optional)
          - [ ] Registrierungsformular mit Backend verbinden

          ## Priorität
          🔴 Kritisch" \
              --label "auth,backend,critical"
          fi

      - name: Create Issue 3 - Passwort-Reset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[AUTH] Passwort vergessen / Reset implementieren" --json title | grep -q "Passwort vergessen"; then
            gh issue create \
              --title "[AUTH] Passwort vergessen / Reset implementieren" \
              --body "## Beschreibung
          Der „Passwort vergessen"-Link im Login ist nicht funktional. Nutzer haben keine Möglichkeit, ihr Passwort zurückzusetzen.

          ## Aufgaben
          - [ ] API-Route \`POST /api/auth/forgot-password\` (Token generieren + E-Mail senden)
          - [ ] API-Route \`POST /api/auth/reset-password\` (Token validieren + Passwort ändern)
          - [ ] UI-Seite \`/passwort-reset\` erstellen
          - [ ] E-Mail-Template für Reset-Link

          ## Priorität
          🔴 Kritisch" \
              --label "auth,backend,critical"
          fi

      - name: Create Issue 4 - Kurs-Einschreibung
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] Kurs-Einschreibung und Zugriffskontrolle" --json title | grep -q "Kurs-Einschreibung"; then
            gh issue create \
              --title "[FEATURE] Kurs-Einschreibung und Zugriffskontrolle" \
              --body "## Beschreibung
          Nutzer können aktuell alle Kursinhalte sehen, obwohl sie nicht eingeschrieben sind. Kauf-Buttons sind nicht funktional.

          ## Aufgaben
          - [ ] Einschreibungs-Logik implementieren (kostenlos vs. bezahlt)
          - [ ] Kurszugriff auf eingeschriebene Nutzer beschränken
          - [ ] „Jetzt kaufen"-Button mit Zahlungs-Flow verbinden
          - [ ] \`enrolledCourses\` in Datenbank speichern und abrufen

          ## Priorität
          🔴 Kritisch" \
              --label "feature,backend,critical"
          fi

      - name: Create Issue 5 - Stripe-Integration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[PAYMENTS] Stripe-Integration für Abonnements und Kurskäufe" --json title | grep -q "Stripe-Integration"; then
            gh issue create \
              --title "[PAYMENTS] Stripe-Integration für Abonnements und Kurskäufe" \
              --body "## Beschreibung
          Keine Zahlungsmöglichkeit vorhanden. Alle Preise und Pläne sind nur zur Darstellung.

          ## Aufgaben
          - [ ] Stripe-Konto verknüpfen + API-Keys konfigurieren
          - [ ] Checkout-Session erstellen (\`POST /api/payments/checkout\`)
          - [ ] Webhook-Handler für Stripe-Events (\`POST /api/payments/webhook\`)
          - [ ] Abonnement-Status in DB aktualisieren
          - [ ] Rechnung-Download implementieren
          - [ ] Zahlungshistorie in \`/abo\` anzeigen

          ## Priorität
          🟠 Hoch" \
              --label "payments,stripe,backend,high"
          fi

      - name: Create Issue 6 - E-Mail-System
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[BACKEND] E-Mail-Versand einrichten (Nodemailer/Resend)" --json title | grep -q "E-Mail-Versand"; then
            gh issue create \
              --title "[BACKEND] E-Mail-Versand einrichten (Nodemailer/Resend)" \
              --body "## Beschreibung
          Das Kontaktformular schickt keine E-Mails. Passwort-Reset und Willkommens-E-Mails fehlen.

          ## Aufgaben
          - [ ] E-Mail-Provider konfigurieren (Resend, Nodemailer mit SMTP)
          - [ ] API-Route \`POST /api/kontakt\` für Kontaktformular
          - [ ] E-Mail-Templates erstellen (Willkommen, Passwort-Reset, Kaufbestätigung)
          - [ ] Rate-Limiting für Kontaktformular

          ## Priorität
          🟠 Hoch" \
              --label "backend,email,high"
          fi

      - name: Create Issue 7 - Video-Hosting
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] Video-Upload und -Streaming für Kurslektionen" --json title | grep -q "Video-Upload"; then
            gh issue create \
              --title "[FEATURE] Video-Upload und -Streaming für Kurslektionen" \
              --body "## Beschreibung
          Kurslektionen haben \`videoUrl\` im Datenmodell, aber kein Video-Hosting. Lektionen können nicht aufgerufen werden.

          ## Aufgaben
          - [ ] Video-Hosting-Lösung auswählen (Mux, Cloudflare Stream, Vimeo)
          - [ ] Upload-API für Admin (\`POST /api/admin/upload\`)
          - [ ] Video-Player-Komponente implementieren
          - [ ] Fortschritt beim Anschauen tracken (Lektionen als abgeschlossen markieren)
          - [ ] Lektion-Zugriffsschutz (nur eingeschriebene Nutzer)

          ## Priorität
          🟠 Hoch" \
              --label "feature,backend,video,high"
          fi

      - name: Create Issue 8 - KI-Assistent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] KI-Assistent mit echter AI-API verbinden" --json title | grep -q "KI-Assistent"; then
            gh issue create \
              --title "[FEATURE] KI-Assistent mit echter AI-API verbinden" \
              --body "## Beschreibung
          Der KI-Assistent sendet aktuell zufällige Fake-Antworten. Es gibt keine echte AI-Integration.

          ## Aufgaben
          - [ ] OpenAI oder Anthropic API einbinden
          - [ ] API-Route \`POST /api/ki/chat\` erstellen
          - [ ] System-Prompt für Arkanum Akademie-Kontext konfigurieren
          - [ ] Chat-Verlauf in Session oder DB speichern
          - [ ] Rate-Limiting pro Nutzer implementieren
          - [ ] KI-Einstellungen im Admin-Bereich funktional machen

          ## Priorität
          🟠 Hoch" \
              --label "feature,ai,high"
          fi

      - name: Create Issue 9 - Google OAuth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[AUTH] Google OAuth Login implementieren" --json title | grep -q "Google OAuth"; then
            gh issue create \
              --title "[AUTH] Google OAuth Login implementieren" \
              --body "## Beschreibung
          „Mit Google fortfahren"-Button ist deaktiviert (disabled). Viele Nutzer bevorzugen Social Login.

          ## Aufgaben
          - [ ] Google OAuth App in Google Console erstellen
          - [ ] \`GOOGLE_CLIENT_ID\` und \`GOOGLE_CLIENT_SECRET\` konfigurieren
          - [ ] Google Provider in NextAuth aktivieren
          - [ ] Account-Verknüpfung mit E-Mail-Accounts sicherstellen

          ## Priorität
          🟠 Hoch" \
              --label "auth,oauth,medium"
          fi

      - name: Create Issue 10 - Admin Nutzer-Management
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[ADMIN] Nutzer-Management-Funktionen implementieren" --json title | grep -q "Nutzer-Management"; then
            gh issue create \
              --title "[ADMIN] Nutzer-Management-Funktionen implementieren" \
              --body "## Beschreibung
          Im Admin-Bereich unter \`/admin/nutzer\` sind alle Buttons (\`Bearbeiten\`, \`Löschen\`, \`Einladen\`) nicht funktional.

          ## Aufgaben
          - [ ] Nutzer-Liste aus Datenbank laden
          - [ ] Nutzer bearbeiten (Rolle, Abo-Status ändern)
          - [ ] Nutzer deaktivieren/löschen
          - [ ] Einladungs-E-Mail senden
          - [ ] Suchfunktion und Filterung

          ## Priorität
          🟡 Mittel" \
              --label "admin,feature,medium"
          fi

      - name: Create Issue 11 - Admin Kurs-Management
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[ADMIN] Kurs- und Lektions-Verwaltung implementieren" --json title | grep -q "Kurs- und Lektions"; then
            gh issue create \
              --title "[ADMIN] Kurs- und Lektions-Verwaltung implementieren" \
              --body "## Beschreibung
          Admin-Seiten \`/admin/kurse\` und \`/admin/lektionen\` zeigen nur statische Tabellen. CRUD-Operationen fehlen.

          ## Aufgaben
          - [ ] Kurs erstellen/bearbeiten/löschen (API + UI)
          - [ ] Lektionen erstellen/bearbeiten/löschen
          - [ ] Drag & Drop für Lektions-Reihenfolge
          - [ ] Bild-Upload für Kurs-Thumbnails
          - [ ] Kurs veröffentlichen/verbergen

          ## Priorität
          🟡 Mittel" \
              --label "admin,feature,medium"
          fi

      - name: Create Issue 12 - Lernfortschritt-Tracking
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] Echtes Lernfortschritt-Tracking implementieren" --json title | grep -q "Lernfortschritt-Tracking"; then
            gh issue create \
              --title "[FEATURE] Echtes Lernfortschritt-Tracking implementieren" \
              --body "## Beschreibung
          Die Seite \`/lernfortschritt\` zeigt Fortschrittsbalken mit statischen Mock-Daten. Echtes Tracking fehlt.

          ## Aufgaben
          - [ ] API \`POST /api/lessons/[id]/complete\` (Lektion als abgeschlossen markieren)
          - [ ] Fortschritt pro Kurs berechnen
          - [ ] Zertifikat ausstellen bei 100% Abschluss
          - [ ] Fortschritt in Datenbank persistent speichern

          ## Priorität
          🟡 Mittel" \
              --label "feature,backend,medium"
          fi

      - name: Create Issue 13 - Profil-Bearbeitung
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] Profil-Bearbeitung mit echtem Backend" --json title | grep -q "Profil-Bearbeitung"; then
            gh issue create \
              --title "[FEATURE] Profil-Bearbeitung mit echtem Backend" \
              --body "## Beschreibung
          Profilseite \`/profil\` erlaubt Bearbeitungen, speichert aber nichts. Änderungen gehen nach Reload verloren.

          ## Aufgaben
          - [ ] API \`PUT /api/user/profile\` erstellen
          - [ ] Avatar-Upload (mit Cloudinary oder lokalem Storage)
          - [ ] Passwort ändern (mit Bestätigung des alten Passworts)
          - [ ] E-Mail-Änderung (mit Bestätigungs-E-Mail)

          ## Priorität
          🟡 Mittel" \
              --label "feature,backend,medium"
          fi

      - name: Create Issue 14 - Kurssuche
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[UX] Kurse-Suche mit Volltextsuche implementieren" --json title | grep -q "Kurse-Suche"; then
            gh issue create \
              --title "[UX] Kurse-Suche mit Volltextsuche implementieren" \
              --body "## Beschreibung
          Auf \`/kurse\` gibt es Kategorie- und Level-Filter, aber keine Texteingabe-Suche. Die Filterung ist nur clientseitig.

          ## Aufgaben
          - [ ] Suchfeld im Kurse-Header hinzufügen
          - [ ] Server-seitige Suche/Filterung implementieren
          - [ ] Suchergebnisse mit URL-Parametern speicherbar machen
          - [ ] Keine Kurse gefunden-Zustand verbessern

          ## Priorität
          🟡 Mittel" \
              --label "ux,feature,medium"
          fi

      - name: Create Issue 15 - Loading States
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[UX] Loading States und Skeleton Screens hinzufügen" --json title | grep -q "Loading States"; then
            gh issue create \
              --title "[UX] Loading States und Skeleton Screens hinzufügen" \
              --body "## Beschreibung
          Beim Laden von Seiten gibt es keine visuellen Rückmeldungen. Nutzer sehen leere Bereiche.

          ## Aufgaben
          - [ ] Skeleton-Loader-Komponente erstellen
          - [ ] Loading States für Datenabruf-Seiten
          - [ ] \`loading.tsx\` für Next.js App Router
          - [ ] Optimistische UI-Updates

          ## Priorität
          🔵 Niedrig" \
              --label "ux,design,low"
          fi

      - name: Create Issue 16 - Error Boundaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[UX] Error Boundaries und 404/500-Seiten" --json title | grep -q "Error Boundaries"; then
            gh issue create \
              --title "[UX] Error Boundaries und 404/500-Seiten" \
              --body "## Beschreibung
          Bei Fehlern gibt es keine nutzerfreundlichen Fehlermeldungen.

          ## Aufgaben
          - [ ] \`error.tsx\` für App Router erstellen
          - [ ] Benutzerdefinierte 404-Seite (\`not-found.tsx\`)
          - [ ] Error Boundary für kritische Komponenten
          - [ ] Toast-Notifications-System (z.B. mit \`react-hot-toast\`)

          ## Priorität
          🔵 Niedrig" \
              --label "ux,design,low"
          fi

      - name: Create Issue 17 - E-Mail-Verifizierung
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[AUTH] E-Mail-Verifizierung bei Registrierung" --json title | grep -q "E-Mail-Verifizierung"; then
            gh issue create \
              --title "[AUTH] E-Mail-Verifizierung bei Registrierung" \
              --body "## Beschreibung
          Neue Nutzer sollten ihre E-Mail-Adresse bestätigen müssen.

          ## Aufgaben
          - [ ] Verifikations-Token generieren und per E-Mail senden
          - [ ] API-Route \`GET /api/auth/verify-email\`
          - [ ] Account erst nach Verifikation aktivieren

          ## Priorität
          🔵 Niedrig" \
              --label "auth,backend,low"
          fi

      - name: Create Issue 18 - Sicherheits-Verbesserungen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[SECURITY] Rate-Limiting, CSRF-Schutz und Security Headers" --json title | grep -q "Rate-Limiting"; then
            gh issue create \
              --title "[SECURITY] Rate-Limiting, CSRF-Schutz und Security Headers" \
              --body "## Beschreibung
          Die Plattform hat keine expliziten Sicherheitsmaßnahmen für Produktionsbetrieb.

          ## Aufgaben
          - [ ] Rate-Limiting für API-Routen (\`next-rate-limit\`)
          - [ ] Security Headers in \`next.config.mjs\`
          - [ ] Input-Validierung mit \`zod\`
          - [ ] CORS-Konfiguration
          - [ ] Next.js auf aktuelle Version aktualisieren (wegen Storage-Vulnerability)

          ## Priorität
          🔵 Niedrig" \
              --label "security,backend,low"
          fi

      - name: Create Issue 19 - Analytics und Monitoring
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[FEATURE] Analytics und Performance-Monitoring" --json title | grep -q "Analytics und Performance"; then
            gh issue create \
              --title "[FEATURE] Analytics und Performance-Monitoring" \
              --body "## Beschreibung
          Keine Nutzerstatistiken oder Fehler-Tracking vorhanden.

          ## Aufgaben
          - [ ] Vercel Analytics oder Plausible einbinden
          - [ ] Fehler-Tracking (Sentry)
          - [ ] Admin-Dashboard mit echten Statistiken verbinden
          - [ ] E-Mail-Öffnungsraten tracken

          ## Priorität
          🔵 Niedrig" \
              --label "feature,analytics,low"
          fi

      - name: Create Issue 20 - Mobile Navigation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh issue list --search "[UX] Mobile Sidebar für Mitglieder- und Admin-Bereich" --json title | grep -q "Mobile Sidebar"; then
            gh issue create \
              --title "[UX] Mobile Sidebar für Mitglieder- und Admin-Bereich" \
              --body "## Beschreibung
          Die Sidebars in Mitglieder- und Admin-Bereich sind auf Mobile nicht sichtbar/zugänglich.

          ## Aufgaben
          - [ ] Hamburger-Menü für Member-Sidebar auf Mobile
          - [ ] Hamburger-Menü für Admin-Sidebar auf Mobile
          - [ ] Overlay bei geöffneter Sidebar
          - [ ] Touch-Gesten (Swipe to close)

          ## Priorität
          🔵 Niedrig" \
              --label "ux,mobile,design,low"
          fi

      - name: Summary
        run: |
          echo "✅ Alle 20 Issues wurden erfolgreich erstellt!"
          echo ""
          echo "📋 Erstellte Issues:"
          echo "🔴 Kritisch (4): Datenbank, Registrierung, Passwort-Reset, Kurs-Einschreibung"
          echo "🟠 Hoch (5): Stripe, E-Mail, Video, KI-Assistent, Google OAuth"
          echo "🟡 Mittel (5): Admin Nutzer, Admin Kurse, Lernfortschritt, Profil, Suche"
          echo "🔵 Niedrig (5): Loading States, Error Boundaries, E-Mail-Verifizierung, Security, Analytics, Mobile"
          echo ""
          echo "Hinweis: Issue 9 (Google OAuth) ist im Hoch-Bereich gelistet, hat aber das Label 'medium' gemäß ISSUES.md."
