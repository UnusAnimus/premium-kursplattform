name: CI – Lint, Build & E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint + Type-check + Build
  # ─────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arkanum_test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arkanum_test
          NEXTAUTH_SECRET: ci-test-secret-32-chars-placeholder
          NEXTAUTH_URL: http://localhost:3000
          SUPER_ADMIN_EMAIL: admin@test.local
          SUPER_ADMIN_NAME: CI Admin
          SUPER_ADMIN_PLAIN_PASSWORD: CiAdmin123!

  # ─────────────────────────────────────────────
  # 2. E2E Tests with Playwright
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-build
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arkanum_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arkanum_test
      NEXTAUTH_SECRET: ci-test-secret-32-chars-placeholder
      NEXTAUTH_URL: http://localhost:3000
      # Super admin is auth-checked via env vars – no DB row needed
      SUPER_ADMIN_EMAIL: admin@test.local
      SUPER_ADMIN_NAME: CI Admin
      SUPER_ADMIN_PLAIN_PASSWORD: CiAdmin123!
      # Credentials used in E2E tests
      E2E_ADMIN_EMAIL: admin@test.local
      E2E_ADMIN_PASSWORD: CiAdmin123!
      E2E_MEMBER_EMAIL: mitglied@arkanum-akademie.de
      E2E_MEMBER_PASSWORD: Member123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed test data (member user)
        run: npm run db:seed

      - name: Build Next.js app
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
